# Пример конфигурации LoRa-Bridge.
# Скопируйте в config.yaml и подставьте секреты через ${ENV_VAR}.
# Подробности модели — docs/ARCHITECTURE.md (§5.1 типы эндпоинтов, §12 конфиг).

lora:                                # МАССИВ физических LoRa-нод
  - id: meshcore-1
    type: meshcore                   # тип ноды/прошивки (meshcore | meshtastic*) — фундамент под LoRa↔LoRa
    # connection: usb(VID:PID) | serial(port) | tcp(host:port) | ble(address)
    connection:
      type: usb
      device_id: "0333:0303"
    # endpoints — это MAP: ключ = имя эндпоинта (на него ссылается rooms[].lora.endpoint).
    # type — термин из MeshCore-приложения; механика (слоты, PSK, login, ACK) — в адаптере, §5.1.
    endpoints:
      general:                                       # Public-канал MeshCore (общий PSK), flood без ACK
        type: public
        channel_name: "General"                      # имя канала из вкладки Channels в MeshCore
      emergency:                                     # Channel со своим secret (приватный), flood без ACK
        type: private
        channel_name: "Emergency"                    # имя канала из вкладки Channels в MeshCore
        secret: ${MC_EMERGENCY_SECRET}
      ops:                                           # Room Server: direct + login, реальный ACK + backfill
        type: room_server
        pubkey: "a1b2c3d4…"
        password: ${MC_OPS_PW}                       # guest-пароль (пусто → read-only)
    policies:                        # политики САМОЙ ноды (радио-специфичны)
      override_oldest_contact_on_full: true
      override_oldest_channel_on_full: true
      egress_rate:                                   # под duty cycle
        msgs_per_window: 6
        window_seconds: 60
      queue_ttl_seconds: 45                          # admission TTL
      commit_timeout_seconds: 30                     # таймаут ACK (room_server) / send (public/private)
      reconnect_backoff:
        base: 2
        max: 60
        jitter: true
      dedup_ttl_seconds: 300
      drop_notice_window_seconds: 60
      label:
        include_type: auto           # auto | always | never (auto: тег если >1 мессенджера в комнате)
        max_nick_bytes: 24           # ник усекаем при необходимости; ТЕКСТ — никогда (AD-11)
        on_oversize: reject          # reject (по умолчанию) — НЕ truncate

  # Вторая нода — другой радиоузел/регион; здесь же демонстрируем LoRa↔LoRa.
  - id: meshcore-2
    type: meshcore
    connection:
      type: tcp
      host: 127.0.0.1
      port: 5000
    endpoints:
      relay:
        type: public
        channel_name: "General"
    policies:
      egress_rate:
        msgs_per_window: 6
        window_seconds: 60

messengers:
  - id: telegram-main
    kind: telegram        # kind → тег источника в префиксе LoRa: "TG"
    tag: "TG"             # переопределение тега (по умолчанию из kind)
    token: ${TG_BOT_TOKEN}
    # privacy mode у бота ДОЛЖЕН быть отключён (BotFather /setprivacy → Disable)

rooms:
  # Вариант 1: 1 LoRa + N мессенджеров
  - lora:                                # node-qualified ссылка
      node: meshcore-1
      endpoint: emergency
    subscribers:
      # topic указан → берём/шлём ТОЛЬКО эту тему
      - transport: telegram-main
        chat: "-1001234567890"
        topic: "42"
      # topic опущен → работаем с General (и только с ним, не со всеми темами)
      - transport: telegram-main
        chat: "-1009999999999"

  # Вариант 2: 2 LoRa, 0 мессенджеров (LoRa↔LoRa) — §12.1.
  # Эндпоинт другой ноды становится подписчиком; relay идёт через commit-очередь цели.
  - lora:
      node: meshcore-1
      endpoint: general
    subscribers:
      - lora:
          node: meshcore-2
          endpoint: relay
